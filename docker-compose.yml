services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reveal_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://reveal_user:reveal_password@db:5432/reveal_db
      - POSTGRES_SERVER=db
      - POSTGRES_USER=reveal_user
      - POSTGRES_PASSWORD=reveal_password
      - POSTGRES_DB=reveal_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: reveal_db
    environment:
      POSTGRES_USER: reveal_user
      POSTGRES_PASSWORD: reveal_password
      POSTGRES_DB: reveal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migrations/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveal_user -d reveal_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
