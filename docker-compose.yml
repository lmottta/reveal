version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: reveal_db
    environment:
      POSTGRES_USER: reveal_user
      POSTGRES_PASSWORD: reveal_password
      POSTGRES_DB: reveal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
