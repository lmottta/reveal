<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JuriPopular | Expondo o que a justiça esconde</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #040407;
        --panel: rgba(10, 10, 14, 0.92);
        --panel-strong: rgba(14, 14, 20, 0.98);
        --border: rgba(255, 255, 255, 0.1);
        --accent: #e10b1a;
        --accent-soft: rgba(96, 12, 20, 0.55);
        --blue: #3b82f6;
        --pink: #ff4bd8;
        --text: #f6f2f2;
        --muted: #b9b0b3;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Manrope", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image: url("/static/img/background.png");
        background-repeat: no-repeat;
        background-size: 720px;
        background-position: 12% 10%;
      }
      body.map-fullscreen {
        overflow: hidden;
      }
      .app {
        min-height: 100vh;
        backdrop-filter: blur(8px);
        background: linear-gradient(120deg, rgba(5, 5, 8, 0.96) 0%, rgba(5, 5, 8, 0.86) 42%, rgba(5, 5, 8, 0.98) 100%);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(5, 5, 8, 0.88);
      }
      @media (max-width: 640px) {
        header {
          padding: 12px 16px;
          flex-wrap: wrap;
          gap: 12px;
        }
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        filter: drop-shadow(0 6px 18px rgba(255, 255, 255, 0.2));
      }
      @media (max-width: 480px) {
        .brand-logo {
          width: 48px;
          height: 48px;
        }
        .brand h1 {
          font-size: 20px;
        }
        .brand span {
          font-size: 11px;
        }
      }
      .brand h1 {
        font-family: "Cinzel", serif;
        letter-spacing: 1px;
        margin: 0;
        font-size: 26px;
      }
      .brand span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
      }
      .top-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      @media (max-width: 480px) {
        .top-actions {
          gap: 8px;
        }
        .btn {
          padding: 8px 12px;
          font-size: 11px;
        }
      }
      .btn {
        padding: 10px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(14, 14, 20, 0.9);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .btn.primary {
        background: linear-gradient(135deg, #1c1c26 0%, #14141d 60%, rgba(229, 9, 20, 0.2) 100%);
        border-color: rgba(229, 9, 20, 0.5);
        color: #fff;
      }
      .session {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        padding: 24px;
        max-width: 1600px;
        margin: 0 auto;
      }
      @media (max-width: 1024px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .side-panel {
          position: static;
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 12px;
        }
      }
      @media (max-width: 640px) {
        .layout {
          padding: 16px;
          gap: 16px;
        }
        .side-panel {
          grid-template-columns: 1fr;
        }
      }
      .side-panel {
        position: sticky;
        top: 24px;
        height: fit-content;
        display: grid;
        gap: 12px;
      }
      .panel-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .main-content {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .view-section {
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .view-section.active {
        display: block;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .map-shell {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #1d1e25;
        height: 70vh;
        min-height: 500px;
        box-shadow: var(--shadow);
      }
      #map {
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .catalog-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
        background: var(--panel);
        padding: 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        align-items: center;
      }
      .catalog-toolbar h2 {
        margin: 0;
        margin-right: auto;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        min-width: 150px;
      }
      .catalog-toolbar .toolbar-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        flex: 1;
      }
      .catalog-toolbar input, 
      .catalog-toolbar select {
        background: #0e0e14;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        min-width: 70px;
        flex: 1;
      }
      .catalog-toolbar input:focus,
      .catalog-toolbar select:focus {
        outline: none;
        border-color: var(--accent);
      }
      .catalog-toolbar button {
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 12px;
        white-space: nowrap;
      }
      .catalog-toolbar button:hover {
        background: var(--accent);
        color: white;
      }
      .catalog-toolbar .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      @media (max-width: 768px) {
        .catalog-toolbar {
          padding: 12px;
          gap: 10px;
        }
        .catalog-toolbar h2 {
          width: 100%;
          margin-bottom: 8px;
        }
        .catalog-toolbar .toolbar-row {
          width: 100%;
        }
        .catalog-toolbar input,
        .catalog-toolbar select {
          min-width: 100px;
        }
      }
      .nav-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }
      .nav-tab {
        padding: 10px 20px;
        background: rgba(255,255,255,0.03);
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--muted);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
      }
      .nav-tab:hover {
        background: rgba(255,255,255,0.06);
        color: var(--text);
      }
      .nav-tab.active {
        background: var(--accent);
        color: white;
        box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
      }
      .loader-overlay {
        position: fixed;
        inset: 0;
        background: rgba(5,5,8,0.94);
        background-image: linear-gradient(rgba(5, 5, 8, 0.92), rgba(5, 5, 8, 0.92)), url("/static/img/background.png");
        background-repeat: no-repeat;
        background-size: 480px;
        background-position: center;
        backdrop-filter: blur(4px);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
      }
      .loader-overlay.visible {
        display: flex;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text);
        text-align: center;
        max-width: 520px;
        padding: 12px 18px;
        border-radius: 12px;
        background: rgba(8, 8, 12, 0.7);
        border: 1px solid rgba(225, 11, 26, 0.28);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      .panel-box h3 {
        margin: 0 0 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }
      .panel-box .kpi-list {
        gap: 4px;
      }
      .search-field {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .search-field input {
        flex: 1;
        padding: 10px 12px;
        background: #0e0e14;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
      }
      .search-field button {
        padding: 10px 12px;
        background: #1f1f2b;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
      }
      .kpi-list {
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: #c5c5cf;
      }
      .kpi-sample {
        margin-top: 6px;
        font-size: 10px;
        gap: 2px;
        color: #9a9aa6;
      }
      .kpi-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .kpi-item:last-child {
        border-bottom: none;
      }
      .map-panel {
        pointer-events: auto;
        position: absolute;
        top: 18px;
        left: 18px;
        background: rgba(12, 12, 16, 0.88);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        width: 220px;
        z-index: 1300;
      }
      .map-panel h4 {
        margin: 0 0 12px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }
      .map-panel label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .map-panel input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0e0e14;
        color: var(--text);
      }
      .map-panel span {
        transition: 0.2s ease;
      }
      .opacity-40 {
        opacity: 0.4;
      }
      .line-through {
        text-decoration: line-through;
      }
      .legend {
        pointer-events: auto;
        position: absolute;
        right: 18px;
        top: 18px;
        background: rgba(12, 12, 16, 0.88);
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 12px;
        z-index: 1300;
      }
      .legend h4 {
        margin: 0 0 10px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot.news {
        background: #ff6b6b;
      }
      .dot.judicial {
        background: #5aa5ff;
      }
      .dot.mixed {
        background: #b873ff;
      }
      .geo-tag {
        pointer-events: auto;
        position: absolute;
        right: 18px;
        bottom: 18px;
        background: rgba(12, 12, 16, 0.88);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 1px;
        text-transform: uppercase;
        z-index: 1300;
      }
      .cards-header {
        display: none;
      }
      #catalog-grid,
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      @media (max-width: 1200px) {
        #catalog-grid,
        .cards-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
      }
      @media (max-width: 768px) {
        #catalog-grid,
        .cards-grid { grid-template-columns: 1fr; }
      }
      .card {
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        min-height: 240px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        cursor: pointer;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        border-color: var(--accent);
      }
      .card-thumb {
        height: 120px;
        background: linear-gradient(120deg, #1c1c25, #0b0b12);
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: rgba(255, 255, 255, 0.35);
        position: relative;
        overflow: hidden;
      }
      .card-thumb::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.4) 100%);
      }
      .card-body {
        padding: 14px 16px 16px;
        display: grid;
        gap: 8px;
        flex: 1;
      }
      .card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted);
        flex-wrap: wrap;
        gap: 4px;
      }
      .card-meta .source {
        max-width: 50%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .card-title {
        font-weight: 700;
        font-size: 14px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-snippet {
        font-size: 12px;
        color: #c6c6d1;
        min-height: 36px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.5;
      }
      .card-action {
        margin-top: auto;
        display: flex;
        justify-content: flex-end;
        padding-top: 8px;
      }
      .card-action button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(12, 12, 18, 0.9);
        color: var(--text);
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s ease;
      }
      .card-action button:hover {
        background: var(--accent);
        border-color: var(--accent);
      }
      .card-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: var(--accent);
        color: white;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: 600;
        z-index: 2;
      }
      .card-links {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .card-links a {
        font-size: 10px;
        color: #9db8ff;
        text-decoration: none;
        padding: 2px 6px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 4px;
        transition: all 0.2s;
      }
      .card-links a:hover {
        background: rgba(157, 184, 255, 0.12);
        border-color: #9db8ff;
      }
      .card-parties {
        font-size: 11px;
        color: #b0b0c0;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        font-style: italic;
      }
      .share-bar {
        display: flex;
        gap: 8px;
        margin: 12px 0;
        flex-wrap: wrap;
      }
      .share-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(12, 12, 18, 0.9);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        text-decoration: none;
        transition: all 0.2s;
      }
      .share-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
      }
      .comments-section {
        margin-top: 16px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }
      .comments-section h4 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .comment-form {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }
      .comment-form input,
      .comment-form textarea {
        background: #0e0e14;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
      }
      .comment-form textarea {
        min-height: 80px;
        resize: vertical;
      }
      .comment-form button {
        padding: 10px 16px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
      }
      .comment-form button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .comment-item {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 13px;
      }
      .comment-item:last-child {
        border-bottom: none;
      }
      .comment-author {
        font-weight: 600;
        color: #9db8ff;
        font-size: 12px;
      }
      .comment-date {
        font-size: 10px;
        color: var(--muted);
        margin-left: 8px;
      }
      .comment-content {
        margin-top: 4px;
        line-height: 1.5;
        color: #d0d0da;
      }
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 2, 6, 0.86);
        display: none;
        align-items: flex-start;
        justify-content: center;
        z-index: 2400;
        padding: 20px 24px 24px;
      }
      #modal-overlay.open {
        display: flex;
      }
      .modal-card {
        background: rgba(12, 12, 18, 0.98);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        width: min(760px, 92vw);
        position: absolute;
        display: grid;
        gap: 14px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        animation: modalSlideIn 0.25s ease;
      }
      @keyframes modalSlideIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-card::-webkit-scrollbar {
        width: 8px;
      }
      .modal-card::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
        border-radius: 4px;
      }
      .modal-card::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 4px;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .modal-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .modal-actions button {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(12, 12, 18, 0.9);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
      }
      .modal-id {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .detail-link {
        color: #9db8ff;
        text-decoration: none;
      }
      .detail-link:hover {
        text-decoration: underline;
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }
      .detail-box {
        background: rgba(17, 17, 26, 0.96);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
        color: #d0d0da;
        word-break: break-word;
        overflow-wrap: break-word;
      }
      .detail-box a {
        color: #9db8ff;
        text-decoration: none;

    <script>
      // View Sections
      const mapView = document.getElementById("map-view")
      const catalogView = document.getElementById("catalog-view")
      
      // Catalog Elements
      const catalogGrid = document.getElementById("catalog-grid")
      const filterState = document.getElementById("filter-state")
      const filterCity = document.getElementById("filter-city")
      const cityLoader = document.getElementById("city-loader")
      const searchMode = document.getElementById("search-mode")
      const filterTerm = document.getElementById("filter-term")
      const btnFilter = document.getElementById("btn-filter")
      const catalogError = document.getElementById("catalog-error")

      // Pagination Elements
      const filterLimit = document.getElementById("filter-limit")
      const btnPrevPage = document.getElementById("btn-prev-page")
      const btnNextPage = document.getElementById("btn-next-page")
      const pageIndicator = document.getElementById("page-indicator")
      
      let currentPage = 1

      // KPI Elements
      const kpiCities = document.getElementById("kpi-cities")
      const kpiStates = document.getElementById("kpi-states")

      // Overlay Elements
      const modalOverlay = document.getElementById("modal-overlay")
      const modalContent = document.getElementById("modal-content")
      const loaderOverlay = document.querySelector(".loader-overlay")
      const loadingText = document.querySelector(".loading-text")

      let mapInstance = null
      let layerNews = null
      let latestCatalog = []
      const REGION_TO_STATES = {
        norte: ["AC", "AP", "AM", "PA", "RO", "RR", "TO"],
        nordeste: ["AL", "BA", "CE", "MA", "PB", "PE", "PI", "RN", "SE"],
        "centro-oeste": ["DF", "GO", "MT", "MS"],
        centrooeste: ["DF", "GO", "MT", "MS"],
        sudeste: ["ES", "MG", "RJ", "SP"],
        sul: ["PR", "RS", "SC"]
      }

      // --- View Navigation ---
      function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'))
        document.getElementById(`${viewName}-view`).classList.add('active') 

        // Update Buttons State (Optional visual feedback)
        if (document.getElementById("open-map")) {
            document.getElementById("open-map").classList.remove("primary") 
            if (viewName === 'map') document.getElementById("open-map").classList.add("primary")
        }
        if (document.getElementById("open-catalog")) {
            document.getElementById("open-catalog").classList.remove("primary")
            if (viewName === 'catalog') document.getElementById("open-catalog").classList.add("primary")
        }
        if (viewName === 'map') {
            setTimeout(() => {
                if (mapInstance) mapInstance.invalidateSize()
            }, 100)
        } else if (viewName === 'catalog' && latestCatalog.length === 0) {
            fetchCatalogData()
        }
      }

      // --- Loading State ---
      function setLoadingText(message) {
        if (!loadingText) return
        loadingText.textContent = message || "Buscando informações..."
      }

      function toggleLoading(show, message) {
        if (show) {
          setLoadingText(message)
          loaderOverlay.classList.add("visible")
        } else {
          loaderOverlay.classList.remove("visible")
        }
      }

      function setError(el, message) {
        if (!el) return
        el.textContent = message || ""
        el.style.display = message ? "block" : "none"
      }

      function normalizeTerm(value) {
        if (!value) return ""
        const base = value.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        const cleaned = base.replace(/[^a-zA-Z0-9.\-\/\s]/g, " ")
        return cleaned.replace(/\s+/g, " ").trim()
      }

      function normalizeRegion(value) {
        return normalizeTerm(value || "").toLowerCase().replace(/\s+/g, "")
      }

      function getRegionStates(value) {
        const normalized = normalizeRegion(value)
        return REGION_TO_STATES[normalized] || []
      }

      function applySearchModePlaceholder() {
        const mode = searchMode.value
        const placeholders = {
          general: "Buscar por termo livre",
          name: "Nome da pessoa ou organização",
          news: "Título ou assunto da notícia",
          city: "Nome da cidade",
          region: "Ex: Norte, Nordeste, Sudeste...",
          state: "UF (ex: SP) ou nome do estado"
        }
        filterTerm.placeholder = placeholders[mode] || "Buscar..."
      }

      function getCityCacheKey(uf) {
        return `cities:${uf}`
      }

      function readCityCache(uf) {
        try {
          const raw = localStorage.getItem(getCityCacheKey(uf))
          if (!raw) return null
          const parsed = JSON.parse(raw)
          if (!parsed || !Array.isArray(parsed.cities)) return null
          if (Date.now() - parsed.ts > 24 * 60 * 60 * 1000) return null
          return parsed.cities
        } catch (e) {
          return null
        }
      }

      function writeCityCache(uf, cities) {
        try {
          localStorage.setItem(getCityCacheKey(uf), JSON.stringify({ ts: Date.now(), cities }))
        } catch (e) {}
      }

      // --- Modal Logic ---
      function closeModal() {
        modalOverlay.classList.remove("open")
        modalOverlay.setAttribute("aria-hidden", "true")
      }

      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) {
          closeModal()
        }
      })

      async function copyProcessId(value) {
        if (!value || value === "-") return
        try {
          await navigator.clipboard.writeText(value)
        } catch (error) {
          const temp = document.createElement("textarea")
          temp.value = value
          temp.style.position = "fixed"
          temp.style.opacity = "0"
          document.body.appendChild(temp)
          temp.focus()
          temp.select()
          document.execCommand("copy")
          document.body.removeChild(temp)
        }
      }

      function positionModal(trigger) {
        if (!trigger) return
        const rect = trigger.getBoundingClientRect()
        requestAnimationFrame(() => {
          const modalRect = modalContent.getBoundingClientRect()
          const padding = 20
          
          const viewportWidth = window.innerWidth
          const viewportHeight = window.innerHeight
          
          const cardCenterX = rect.left + rect.width / 2
          const cardCenterY = rect.top + rect.height / 2
          
          const isLeftSide = cardCenterX < viewportWidth / 2
          const isTopSide = cardCenterY < viewportHeight / 2
          
          let top, left
          
          const modalWidth = Math.min(760, viewportWidth - padding * 2)
          const modalHeight = Math.min(600, viewportHeight - padding * 2)
          
          if (isTopSide) {
            top = rect.bottom + padding
            if (top + modalHeight > viewportHeight - padding) {
              top = rect.top - modalHeight - padding
            }
          } else {
            top = rect.top - modalHeight - padding
            if (top < padding) {
              top = rect.bottom + padding
            }
          }
          
          if (isLeftSide) {
            left = rect.left
            if (left + modalWidth > viewportWidth - padding) {
              left = viewportWidth - modalWidth - padding
            }
          } else {
            left = rect.right - modalWidth
            if (left < padding) {
              left = padding
            }
          }
          
          top = Math.max(padding, Math.min(top, viewportHeight - modalHeight - padding))
          left = Math.max(padding, Math.min(left, viewportWidth - modalWidth - padding))
          
          modalContent.style.top = `${top}px`
          modalContent.style.left = `${left}px`
          modalContent.style.width = `${modalWidth}px`
          modalContent.style.maxHeight = `${viewportHeight - padding * 2}px`
          modalContent.style.overflow = 'auto'
        })
      }

      function generateStorytelling(item, itemType) {
        const title = item.title || item.classe || "Caso"
        const snippet = item.snippet || item.assunto || ""
        const city = item.city || "Local não especificado"
        const state = item.state || ""
        const source = item.source || item.tribunal || "Fonte"
        const published = item.published_date || item.data_distribuicao || ""
        
        const location = state ? `${city} - ${state}` : city
        
        const formatDate = (dateStr) => {
          if (!dateStr) return "Data não disponível"
          try {
            const date = new Date(dateStr)
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
          } catch {
            return dateStr
          }
        }
        
        const extractKeywords = (text) => {
          const keywords = ['estupro', 'abuso', 'sexual', 'violência', 'exploração', 'tráfico', 'pedofilia', 'pornografia', 'assedio', 'aliciamento', 'vulnerável', 'incapaz', 'menor', 'infantil', 'crime', 'condenação', 'prisão', 'flagrante', 'investigação', 'operação', 'polícia']
          return keywords.filter(kw => text.toLowerCase().includes(kw))
        }
        
        const keywords = extractKeywords(snippet)
        
        const generateNarrative = () => {
          let narrative = `<p><strong>RELATÓRIO JORNALÍSTICO</strong></p>`
          narrative += `<p>${title}</p>`
          
          if (itemType === "news") {
            narrative += `<p>Um caso de <strong>${keywords.slice(0, 2).join(' e ')}</strong> foi registrado em <strong>${location}</strong>.</p>`
            
            if (snippet) {
              narrative += `<p><em>${snippet.substring(0, 300)}${snippet.length > 300 ? '...' : ''}</em></p>`
            }
            
            narrative += `<p>A informação foi publicada por <strong>${source}</strong>${published ? ` em ${formatDate(published)}` : ''}.</p>`
            
            if (state) {
              narrative += `<p>Este caso ocorre em <strong>${state}</strong>, região que tem registrado diversos casos relacionados a crimes sexuais.</p>`
            }
            
            narrative += `<p>O caso destaca a necessidade de <strong>proteção às vítimas</strong> e o combate a crimes sexuais na região.</p>`
          } else {
            const processNumber = item.processo || item.numero_processo || "-"
            const status = item.status || "Em tramitação"
            const court = item.vara || item.foro || "Tribunal"
            
            narrative += `<p>Processo judicial <strong>${processNumber}</strong> em trâmite em <strong>${location}</strong>.</p>`
            narrative += `<p><strong>Natureza:</strong> ${item.classe || item.assunto || 'Não especificada'}</p>`
            narrative += `<p><strong>Foro:</strong> ${court}</p>`
            narrative += `<p><strong>Status:</strong> ${status}</p>`
            
            if (snippet) {
              narrative += `<p><em>${snippet.substring(0, 300)}${snippet.length > 300 ? '...' : ''}</em></p>`
            }
          }
          
          return narrative
        }
        
        return generateNarrative()
      }

      function shareUrl(platform, item) {
        const url = item.url || window.location.href
        const text = `${item.title || "JuriPopular - Denúncia de Crime Sexual"}`
        const fullUrl = `${url}?ref=${platform}`
        const encodedUrl = encodeURIComponent(fullUrl)
        const encodedText = encodeURIComponent(text)
        const links = {
          whatsapp: `https://wa.me/?text=${encodedText}%20${encodedUrl}`,
          twitter: `https://twitter.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`,
          facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
          telegram: `https://t.me/share/url?url=${encodedUrl}&text=${encodedText}`
        }
        if (platform === 'copy') {
          navigator.clipboard.writeText(fullUrl).catch(() => {})
          return
        }
        window.open(links[platform], '_blank', 'width=600,height=400')
      }

      async function loadComments(newsId, container) {
        try {
          const res = await fetch(`/api/v1/comments/${newsId}`)
          if (!res.ok) return
          const comments = await res.json()
          container.innerHTML = comments.map(c => `
            <div class="comment-item">
              <span class="comment-author">${c.author}</span>
              <span class="comment-date">${new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
              <div class="comment-content">${c.content}</div>
            </div>
          `).join("") || "<div style='color:var(--muted);font-size:12px;'>Nenhum comentário ainda. Seja o primeiro a comentar.</div>"
        } catch (e) {
          container.innerHTML = "<div style='color:var(--muted);font-size:12px;'>Erro ao carregar comentários.</div>"
        }
      }

      async function submitComment(newsId, form) {
        const author = form.querySelector('.comment-author-input').value.trim() || "Anônimo"
        const content = form.querySelector('.comment-content-input').value.trim()
        if (!content || content.length < 2) return
        const btn = form.querySelector('button')
        btn.disabled = true
        btn.textContent = "Enviando..."
        try {
          const res = await fetch('/api/v1/comments', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({news_id: newsId, author, content})
          })
          if (!res.ok) throw new Error()
          form.querySelector('.comment-content-input').value = ""
          const container = form.parentElement.querySelector('.comments-list')
          await loadComments(newsId, container)
        } catch (e) {}
        btn.disabled = false
        btn.textContent = "Comentar"
      }

      function openModal(item, trigger) {
        const rawParties = item.partes || item.parties || []
        const parties = Array.isArray(rawParties) ? rawParties : []
        const processNumber = item.processo || item.numero_processo || item.id || "-"
        const tribunal = item.tribunal || item.source || "Tribunal de Justiça"
        const itemType = item.type || (item.url ? "news" : "judicial")
        const city = item.city || ""
        const state = item.state || ""
        const cityState = `${city || "Nacional"} ${state || ""}`.trim()
        
        const cityQuery = city && state ? `${city}, ${state}, Brasil` : (city ? `${city}, Brasil` : (state ? `${state}, Brasil` : "Brasil"))
        const geoLink = cityQuery ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cityQuery)}` : ""
        
        const published = item.published_date || item.data_distribuicao || item.created_at || "-"
        const status = item.status || item.situacao || "-"
        const partiesText = parties.slice(0, 10).map((p) => {
          const role = p?.tipo || p?.role || "Parte"
          const name = p?.nome || p?.name || "-"
          return `${role}: ${name}`
        }).join("<br/>") || (typeof rawParties === "string" ? rawParties : "-")
        
        const storytelling = generateStorytelling(item, itemType)
        const sourceUrl = item.url || ""
        const displayUrl = sourceUrl.length > 60 ? sourceUrl.substring(0, 60) + "..." : sourceUrl

        const denunciaLink = state ? `https://www.gov.br/mj/pt-br/denuncia-violencia` : "#"
        const orgLink = item.source && item.source !== "Google News"
          ? `https://www.google.com/search?q=${encodeURIComponent(item.source)}`
          : (item.tribunal ? `https://www.${item.tribunal.toLowerCase()}.jus.br` : "#")

        modalContent.innerHTML = `
          <div class="modal-header">
            <div class="modal-title">${item.title || item.classe || "Ação Penal"}</div>
            <div class="modal-actions">
              <span class="tag">${tribunal}</span>
              <button type="button" id="modal-close">Fechar</button>
            </div>
          </div>
          <div class="modal-id">
            <span class="tag">ID: ${processNumber}</span>
            <button type="button" id="copy-process">Copiar ID</button>
          </div>
          <div class="storytelling-box">${storytelling}</div>
          <div class="detail-grid">
            ${[{ label: "Fonte", value: item.source || "-" },
               { label: "Data", value: published || "-" },
               { label: "Local", value: cityState || "-" },
               { label: "Ver no Mapa", value: geoLink ? `<a class="detail-link" href="${geoLink}" target="_blank" rel="noopener noreferrer">📍 ${cityQuery}</a>` : cityState || "-" },
               ...(partiesText !== "-" ? [{ label: "Envolvidos", value: partiesText }] : []),
               ...(itemType !== "news" ? [{ label: "Status", value: status || "-" }] : [])
            ].map(b => `<div class="detail-box"><strong>${b.label}</strong><div>${b.value}</div></div>`).join("")}
          </div>
          ${sourceUrl ? `<div class="detail-box source-link-box"><strong>🗞️ Acessar Fonte Original</strong><a href="${sourceUrl}" target="_blank" rel="noopener noreferrer" class="source-link">🔗 ${displayUrl}</a></div>` : ""}
          <div class="detail-box" style="border-color:var(--accent);margin-top:8px;">
            <strong>🛡️ Canais de Denúncia</strong>
            <a href="${denunciaLink}" target="_blank" rel="noopener noreferrer" style="color:#ff6b6b;display:block;margin-top:6px;font-size:12px;">📢 Denunciar ao Governo Federal</a>
            <a href="https://disque100.gov.br" target="_blank" rel="noopener noreferrer" style="color:#ff6b6b;display:block;font-size:12px;">📞 Disque 100 - Direitos Humanos</a>
            <a href="${orgLink}" target="_blank" rel="noopener noreferrer" style="color:#9db8ff;display:block;font-size:12px;">⚖️ ${item.source || tribunal}</a>
          </div>
          <div class="share-bar">
            <a class="share-btn" onclick="shareUrl('whatsapp', ${JSON.stringify(item).replace(/"/g,'&quot;')})">📱 WhatsApp</a>
            <a class="share-btn" onclick="shareUrl('twitter', ${JSON.stringify(item).replace(/"/g,'&quot;')})">🐦 Twitter</a>
            <a class="share-btn" onclick="shareUrl('facebook', ${JSON.stringify(item).replace(/"/g,'&quot;')})">📘 Facebook</a>
            <a class="share-btn" onclick="shareUrl('telegram', ${JSON.stringify(item).replace(/"/g,'&quot;')})">✈️ Telegram</a>
            <a class="share-btn" onclick="shareUrl('copy', ${JSON.stringify(item).replace(/"/g,'&quot;')})">🔗 Copiar Link</a>
          </div>
          <div class="comments-section">
            <h4>Comentários</h4>
            <div class="comment-form">
              <input class="comment-author-input" type="text" placeholder="Seu nome (opcional)" maxlength="50" />
              <textarea class="comment-content-input" placeholder="Compartilhe sua opinião ou informação sobre este caso..." maxlength="1000"></textarea>
              <button onclick="submitComment(${item.id}, this.closest('.comment-form'))">Comentar</button>
            </div>
            <div class="comments-list"></div>
          </div>
        `

        modalContent.querySelector("#modal-close").addEventListener("click", closeModal)
        modalContent.querySelector("#copy-process").addEventListener("click", () => copyProcessId(processNumber))
        
        modalOverlay.classList.add("open")
        modalOverlay.setAttribute("aria-hidden", "false")
        positionModal(trigger)
        loadComments(item.id, modalContent.querySelector('.comments-list'))
      }

      // --- Catalog Rendering ---
      function mapSearchPayload(payload) {
        const items = []
        const news = Array.isArray(payload?.news) ? payload.news : []
        news.forEach((item) => {
          items.push({ ...item, type: "news" })
        })
        return items
      }

      function applySearchResults(payload) {
        const items = mapSearchPayload(payload)
        const uniqueItems = dedupeItems(items)
        latestCatalog = uniqueItems
        renderCatalog(uniqueItems)
        return uniqueItems.length
      }

      function normalizeKeyPart(value) {
        return String(value || "").trim().toLowerCase()
      }

      function normalizeUrl(value) {
        const raw = String(value || "").trim()
        if (!raw) return ""
        try {
          const parsed = new URL(raw)
          const params = new URLSearchParams(parsed.search)
          Array.from(params.keys()).forEach((key) => {
            const lower = key.toLowerCase()
            if (lower.startsWith("utm_") || ["gclid", "fbclid", "igshid", "mc_cid", "mc_eid"].includes(lower)) {
              params.delete(key)
            }
          })
          parsed.search = params.toString()
          const normalized = `${parsed.origin}${parsed.pathname}`.replace(/\/$/, "")
          return parsed.search ? `${normalized}?${parsed.search}`.toLowerCase() : normalized.toLowerCase()
        } catch (e) {
          return raw.toLowerCase()
        }
      }

      function getItemKey(item) {
        const type = item.type || (item.url ? "news" : "judicial")
        if (type === "news") {
          const url = normalizeUrl(item.url)
          if (url) return `news:${url}`
          const title = normalizeKeyPart(item.title)
          const source = normalizeKeyPart(item.source)
          const date = normalizeKeyPart(item.published_date)
          return `news:${title}|${source}|${date}`
        }
        const rawProcess = item.processo || item.numero_processo || item.id
        const processKey = String(rawProcess || "").replace(/\D/g, "")
        const title = normalizeKeyPart(item.title || item.classe)
        const source = normalizeKeyPart(item.source || item.tribunal)
        const snippet = normalizeKeyPart(item.snippet || item.assunto)
        if (processKey) {
          const visualKey = `judicial:${title}|${source}|${snippet}`
          return visualKey
        }
        return `judicial:${title}|${source}|${snippet}`
      }

      function dedupeItems(items) {
        const seen = new Set()
        const uniqueItems = []
        items.forEach((item) => {
          const key = getItemKey(item)
          if (seen.has(key)) return
          seen.add(key)
          uniqueItems.push(item)
        })
        return uniqueItems
      }

      function renderCatalog(items) {
        const onlyNews = (Array.isArray(items) ? items : []).filter((item) => (item?.type || (item?.url ? "news" : "judicial")) === "news")
        const uniqueItems = dedupeItems(onlyNews)
        catalogGrid.innerHTML = ""
        if (uniqueItems.length === 0) {
            catalogGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">Nenhum registro encontrado para os filtros selecionados.</div>`
            return
        }

        uniqueItems.forEach((item) => {
          const card = document.createElement("div")
          card.className = "card"
          const isNews = item.type === "news"
          const thumbStyle = item.image_url ? `style="background-image:url('${item.image_url}')"` : ""
          const iconEmoji = isNews ? "📰" : "⚖️"
          const locationText = item.state ? (item.city ? `${item.city} - ${item.state}` : item.state) : "Nacional"
          const sourceUrl = item.url || ""
          const displayUrl = sourceUrl.length > 50 ? sourceUrl.substring(0, 50) + "..." : sourceUrl
          const parties = item.partes || item.parties || []
          const partiesText = Array.isArray(parties) ? parties.slice(0, 2).map(p => p.nome || p.name || "").filter(Boolean).join(", ") : ""

          card.innerHTML = `
            <div class="card-thumb" ${thumbStyle}>
              ${!item.image_url ? iconEmoji : ''}
              <span class="card-badge">${isNews ? 'Notícia' : 'Judicial'}</span>
            </div>
            <div class="card-body">
              <div class="card-meta">
                <span class="source">${item.source || item.tribunal || 'TJ'}</span>
                <span>${locationText}</span>
              </div>
              <div class="card-title">${item.title || item.classe || "Processo Judicial"}</div>
              <div class="card-snippet">${item.snippet || item.assunto || "Sem descrição"}</div>
              ${partiesText ? `<div class="card-parties">${partiesText}</div>` : ""}
              ${sourceUrl ? `<div class="card-links"><a href="${sourceUrl}" target="_blank" rel="noopener noreferrer">🔗 Fonte</a></div>` : ""}
              <div class="card-action">
                <button type="button">VER MAIS</button>
              </div>
            </div>
          `
          card.addEventListener("click", () => openModal(item, card))
          card.querySelector("button").addEventListener("click", (e) => {
            e.stopPropagation()
            openModal(item, card)
          })
          catalogGrid.appendChild(card)
        })
      }

      // --- Data Fetching ---
      async function fetchAnalysisData() {
        console.log("fetchAnalysisData called")
        toggleLoading(true, "Gerando storytelling e BI judicial...")
        try {
          const params = new URLSearchParams()
          if (filterState.value) params.append("state", filterState.value) 
          if (filterCity.value) params.append("city", filterCity.value)    
          if (filterTerm.value) params.append("term", filterTerm.value)    

          console.log("Fetching analysis with params:", params.toString())
          const res = await fetch(`/api/v1/search/analyze?${params}`)      
          console.log("Analysis fetch response status:", res.status)
          
          if (!res.ok) throw new Error("Erro ao buscar análise")
          const data = await res.json()
          console.log("Analysis data received:", data)

          if (data.status === "success") {
              // Convert markdown-like syntax to basic HTML
              let htmlContent = data.analysis || ""
              htmlContent = htmlContent
                  .replace(/#### (.*?)\n/g, '<h3 style="color: #ff4bd8; margin-top: 20px;">$1</h3>')
                  .replace(/### (.*?)\n/g, '<h2 style="color: #fff; margin-bottom: 15px;">$1</h2>')
                  .replace(/\*\*(.*?)\*\*/g, '<strong style="color: #fff;">$1</strong>')
                  .replace(/- (.*?)(?=\n|$)/g, '<li style="margin-bottom: 8px;">$1</li>')
                  .replace(/<\/li><li/g, '</li>\n<li')
                  .replace(/\n/g, '<br>')
                  
              // Wrap list items in ul
              htmlContent = htmlContent.replace(/(<li.*?<\/li>)/gs, '<ul style="padding-left: 20px;">$1</ul>')
              htmlContent = htmlContent.replace(/<\/ul><br><ul.*?>/g, '') // remove extra uls
              
              document.getElementById("analysis-content").innerHTML = `
                  <div style="margin-bottom: 25px; padding: 18px; background: rgba(255,255,255,0.05); border-radius: 10px; border-left: 4px solid #ff4bd8;">
                      <strong style="color: #fff; font-size: 16px;">Resumo da Apuração:</strong><br> 
                      A narrativa consolidou <span style="color: #ff4bd8; font-weight: bold;">${data.total_news} notícias</span> e utilizou <span style="color: #ff4bd8; font-weight: bold;">${data.total_lawsuits} processos</span> apenas no nível macro para BI.
                  </div>
                  <div style="background: rgba(10, 10, 14, 0.5); padding: 20px; border-radius: 10px; border: 1px solid var(--border);">
                      ${htmlContent}
                  </div>
              `
          } else {
              document.getElementById("analysis-content").innerHTML = "Erro ao gerar análise."
          }
        } catch (err) {
          console.error("fetchAnalysisData error:", err)
          document.getElementById("analysis-content").innerHTML = "Erro de conexão ao buscar análise."
        } finally {
          toggleLoading(false)
        }
      }

      async function fetchCatalogData() {
        toggleLoading(true)
        const controller = new AbortController()
        const timeoutId = setTimeout(() => controller.abort(), 30000) // 30s timeout

        try {
            setError(catalogError, "")
            const mode = searchMode.value
            const rawTerm = filterTerm.value.trim()
            const term = normalizeTerm(rawTerm)
            let state = filterState.value
            let city = filterCity.value
            const limit = filterLimit.value
            const regionStates = mode === "region" ? getRegionStates(term) : []

            if (rawTerm && term.length < 2) {
                setError(catalogError, "Informe ao menos 2 caracteres para buscar.")
                return
            }
            if (rawTerm && term !== rawTerm) {
                setError(catalogError, "Caracteres inválidos foram removidos da busca.")
            }

            if (mode === "city" && term && !city) city = term.toUpperCase()
            if (mode === "state" && term && !state) state = term.toUpperCase().slice(0, 2)
            
            const params = new URLSearchParams({ 
                source_type: "news", 
                limit: limit,
                page: currentPage.toString()
            })
            if (term && !["state", "city"].includes(mode)) params.append("term", term)
            if (state) params.append("state", state)
            if (city) params.append("city", city)
            
            const response = await fetch(`/api/v1/search/catalog?${params.toString()}`, {
                signal: controller.signal
            })
            if (!response.ok) throw new Error("Erro na busca")
            
            const data = await response.json()
            const items = Array.isArray(data) ? data : []
            let uniqueItems = dedupeItems(items)
            if (mode === "region" && regionStates.length) {
              uniqueItems = uniqueItems.filter((item) => regionStates.includes(String(item.state || "").toUpperCase()))
            }
            
            latestCatalog = uniqueItems
            renderCatalog(uniqueItems)

            // Pagination UI update
            pageIndicator.textContent = `Página ${currentPage}`
            btnPrevPage.disabled = currentPage <= 1
            // Se o número de itens retornados (após deduplicação) for menor que o limite solicitado,
            // ou se for 0, provavelmente chegamos ao fim.
            // O backend retorna um multiplicador (5x), então items.length pode ser maior que limit.
            // Mas uniqueItems.length é o que importa para o usuário.
            // Se uniqueItems for 0, com certeza não tem mais nada para mostrar (nessa página).
            // Vamos desabilitar o botão Next se uniqueItems for 0.
            if (uniqueItems.length === 0) {
                 btnNextPage.disabled = true
            } else {
                 btnNextPage.disabled = false
            }

        } catch (err) {
            console.error(err)
            if (err.name === 'AbortError') {
                setError(catalogError, "A busca demorou muito. Refine os filtros e tente novamente.")
            } else {
                setError(catalogError, "Erro ao buscar. Tente novamente.")
            }
            renderCatalog([])
        } finally {
            clearTimeout(timeoutId)
            toggleLoading(false)
        }
      }

      async function populateCities(uf) {
        setError(catalogError, "")
        if (!uf) {
            filterCity.innerHTML = '<option value="">Cidade</option>'
            filterCity.disabled = true
            return
        }
        const cached = readCityCache(uf)
        if (cached) {
            filterCity.innerHTML = '<option value="">Todas as Cidades</option>'
            cached.forEach(city => {
                const opt = document.createElement("option")
                opt.value = city
                opt.textContent = city
                filterCity.appendChild(opt)
            })
            filterCity.disabled = false
            return
        }
        
        const loader = document.getElementById("city-loader")
        if(loader) loader.style.display = "block"
        filterCity.disabled = true
        
        try {
            let res = await fetch(`/api/v1/search/cities?uf=${uf}`)
            if (!res.ok) {
              res = await fetch(`/api/v1/stats/ufs/${uf}/cities`)
            }
            if(!res.ok) throw new Error("Erro ao carregar cidades")
            const cities = await res.json()
            
            filterCity.innerHTML = '<option value="">Todas as Cidades</option>'
            cities.forEach(city => {
                const opt = document.createElement("option")
                opt.value = city
                opt.textContent = city
                filterCity.appendChild(opt)
            })
            filterCity.disabled = false
            writeCityCache(uf, cities)
        } catch (e) {
            console.error(e)
            filterCity.innerHTML = '<option value="">Erro ao carregar</option>'
        } finally {
            if(loader) loader.style.display = "none"
        }
      }

      async function fetchKpis() {
        const params = new URLSearchParams()
        if (filterState.value) params.append("state", filterState.value)
        if (filterCity.value) params.append("city", filterCity.value)
        const term = normalizeTerm(filterTerm.value.trim())
        if (term) params.append("term", term)
        
        try {
            const response = await fetch(`/api/v1/search/analyze?${params.toString()}`)
            if (!response.ok) return
            const data = await response.json()
            const bi = data?.judicial_bi || {}
            
            kpiCities.innerHTML = ""
            kpiStates.innerHTML = ""

            const nationalItem = document.createElement("div")
            nationalItem.className = "kpi-item"
            nationalItem.innerHTML = `<span>Processos Judiciais</span><strong>${bi.total_national || 0}</strong>`
            kpiCities.appendChild(nationalItem)

            if (bi.unknown_state_cases) {
              const unknown = document.createElement("div")
              unknown.className = "kpi-item"
              unknown.innerHTML = `<span>Sem UF classificada</span><strong>${bi.unknown_state_cases}</strong>`
              kpiCities.appendChild(unknown)
            }

            ;(bi.regional_distribution || []).forEach((item) => {
              const div = document.createElement("div")
              div.className = "kpi-item"
              div.innerHTML = `<span>${item.region}</span><strong>${item.count} (${item.percent}%)</strong>`
              kpiCities.appendChild(div)
            })

            const topStates = (bi.state_ranking || []).slice(0, 5)
            const topCities = (bi.municipal_focus || []).filter((item) => item.state && item.state !== "NA").slice(0, 5)
            topStates.forEach((item, idx) => {
              const div = document.createElement("div")
              div.className = "kpi-item"
              div.innerHTML = `<span>Estado #${idx + 1} - ${item.state}</span><strong>${item.count}</strong>`
              kpiStates.appendChild(div)
            })
            topCities.forEach((item, idx) => {
              const div = document.createElement("div")
              div.className = "kpi-item"
              div.innerHTML = `<span>Cidade #${idx + 1} - ${item.city}/${item.state}</span><strong>${item.count}</strong>`
              kpiStates.appendChild(div)
            })
        } catch (e) { console.error(e) }
      }

      // --- Map Logic ---
      function ensureMap() {
        if (mapInstance) return
        mapInstance = L.map("map", { 
            zoomControl: true,
            minZoom: 3,
            maxBounds: [[-45, -90], [10, -20]] // Limites da América do Sul
        }).setView([-14.235, -51.9253], 4)
        
        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
          attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
        }).addTo(mapInstance)
        layerNews = L.layerGroup().addTo(mapInstance)
      }

      function markerIcon(type) {
        return L.divIcon({
          className: "",
          html: `<div class="marker ${type}"></div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        })
      }

      async function fetchGeo() {
        ensureMap()
        layerNews.clearLayers()
        const term = normalizeTerm(filterTerm.value.trim())
        const params = new URLSearchParams()
        params.append("source_type", "news")
        if (term) params.append("term", term)
        if (filterState.value) params.append("state", filterState.value)
        if (filterCity.value) params.append("city", filterCity.value)
        
        try {
            const response = await fetch(`/api/v1/stats/geo?${params.toString()}`)
            if (!response.ok) return
            const data = await response.json()
            
            data.forEach((point) => {
              if (!point.lat || !point.lng) return
              const type = point.type || "news"
              if (type !== "news") return
              const marker = L.marker([point.lat, point.lng], { icon: markerIcon(type) })
              marker.bindPopup(`
                <div style="font-size:12px;">
                  <strong>${point.city} (${point.state})</strong><br/>
                  ${point.count} Ocorrências<br/>
                  Mídia/Imprensa
                  <div style="margin-top:8px;">
                    <button onclick="window.filterByRegion('${point.city}','${point.state}')" style="padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:#1b1b24;color:#fff;cursor:pointer;">VER CASOS DESTA REGIÃO</button>
                  </div>
                </div>
              `, { autoPan: true, keepInView: true, autoPanPadding: [80, 80] })
              marker.on("click", () => {
                mapInstance.panTo([point.lat, point.lng], { animate: true })
              })
              layerNews.addLayer(marker)
            })
        } catch(e) { console.error(e) }
      }

      window.filterByRegion = async (city, state) => {
        filterState.value = state
        await populateCities(state)
        filterCity.value = city
        searchMode.value = "city"
        filterTerm.value = city
        switchView('catalog')
        await fetchCatalogData()
        await fetchKpis()
      }

      // --- Event Listeners ---
      document.getElementById("open-map").addEventListener("click", () => switchView('map'))
      document.getElementById("open-catalog").addEventListener("click", () => switchView('catalog'))

      btnFilter.addEventListener("click", () => {
          currentPage = 1
          fetchCatalogData()
          fetchGeo()
          fetchKpis()
      })
      
      filterLimit.addEventListener("change", () => {
          currentPage = 1
          fetchCatalogData()
      })
      
      btnPrevPage.addEventListener("click", () => {
          if (currentPage > 1) {
              currentPage--
              fetchCatalogData()
          }
      })
      
      btnNextPage.addEventListener("click", () => {
          currentPage++
          fetchCatalogData()
      })
      
      searchMode.addEventListener("change", () => {
          applySearchModePlaceholder()
          currentPage = 1
          fetchCatalogData()
          fetchGeo()
          fetchKpis()
      })
      
      filterState.addEventListener("change", async () => {
        currentPage = 1
        await populateCities(filterState.value)
        fetchCatalogData()
        fetchKpis()
        fetchGeo()
      })
      
      filterCity.addEventListener("change", () => {
          currentPage = 1
          fetchCatalogData()
          fetchKpis()
          fetchGeo()
      })

      filterTerm.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
              currentPage = 1
              fetchCatalogData()
              fetchKpis()
              fetchGeo()
          }
      })
      filterTerm.addEventListener("input", () => setError(catalogError, ""))

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal()
      })

      // --- Init ---
      applySearchModePlaceholder()
      
      window.addEventListener("load", async () => {
        ensureMap()
        await fetchGeo()
        await fetchKpis()
        await fetchCatalogData()
      })
    </script>
  </body>
</html>
